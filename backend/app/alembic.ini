# ==============================================================================
# Alembic 設定（ふりぃらじかるず backend）
# 接続URLは env.py が DB_BACKEND シーム（app.config.resolve_database_url）から解決するため、
# ここでは sqlalchemy.url を空にしている。
# 実行例（backend/ ディレクトリから）:
#   alembic -c app/alembic.ini upgrade head
# ==============================================================================
[alembic]
# %(here)s は本 ini があるディレクトリ（backend/app）。
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
